naftiko: 1.0.0-alpha2
info:
  label: HashiCorp Vault Vault Secrets Engines API — AWS
  description: 'HashiCorp Vault Vault Secrets Engines API — AWS. 4 operations. Lead operation: HashiCorp Vault Generate AWS
    credentials. Self-contained Naftiko capability covering one Hvault business surface.'
  tags:
  - Hvault
  - AWS
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    HVAULT_API_KEY: HVAULT_API_KEY
capability:
  consumes:
  - type: http
    namespace: secrets-engines-aws
    baseUri: https://vault.example.com/v1
    description: HashiCorp Vault Vault Secrets Engines API — AWS business capability. Self-contained, no shared references.
    resources:
    - name: aws-creds-name
      path: /aws/creds/{name}
      operations:
      - name: generateawscredentials
        method: GET
        description: HashiCorp Vault Generate AWS credentials
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: name
          in: path
          type: string
          description: Name of the role
          required: true
    - name: aws-roles-name
      path: /aws/roles/{name}
      operations:
      - name: readawsrole
        method: GET
        description: HashiCorp Vault Read AWS role
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: name
          in: path
          type: string
          description: Name of the role
          required: true
      - name: createorupdateawsrole
        method: POST
        description: HashiCorp Vault Create or update AWS role
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: name
          in: path
          type: string
          description: Name of the role
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
      - name: deleteawsrole
        method: DELETE
        description: HashiCorp Vault Delete AWS role
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: name
          in: path
          type: string
          description: Name of the role
          required: true
    authentication:
      type: apikey
      key: X-Vault-Token
      value: '{{env.HVAULT_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: secrets-engines-aws-rest
    port: 8080
    description: REST adapter for HashiCorp Vault Vault Secrets Engines API — AWS. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/aws/creds/{name}
      name: aws-creds-name
      description: REST surface for aws-creds-name.
      operations:
      - method: GET
        name: generateawscredentials
        description: HashiCorp Vault Generate AWS credentials
        call: secrets-engines-aws.generateawscredentials
        with:
          name: rest.name
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/aws/roles/{name}
      name: aws-roles-name
      description: REST surface for aws-roles-name.
      operations:
      - method: GET
        name: readawsrole
        description: HashiCorp Vault Read AWS role
        call: secrets-engines-aws.readawsrole
        with:
          name: rest.name
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: createorupdateawsrole
        description: HashiCorp Vault Create or update AWS role
        call: secrets-engines-aws.createorupdateawsrole
        with:
          name: rest.name
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
      - method: DELETE
        name: deleteawsrole
        description: HashiCorp Vault Delete AWS role
        call: secrets-engines-aws.deleteawsrole
        with:
          name: rest.name
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: secrets-engines-aws-mcp
    port: 9090
    transport: http
    description: MCP adapter for HashiCorp Vault Vault Secrets Engines API — AWS. One tool per consumed operation, routed
      inline through this capability's consumes block.
    tools:
    - name: hashicorp-vault-generate-aws-credentials
      description: HashiCorp Vault Generate AWS credentials
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: secrets-engines-aws.generateawscredentials
      with:
        name: tools.name
      outputParameters:
      - type: object
        mapping: $.
    - name: hashicorp-vault-read-aws-role
      description: HashiCorp Vault Read AWS role
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: secrets-engines-aws.readawsrole
      with:
        name: tools.name
      outputParameters:
      - type: object
        mapping: $.
    - name: hashicorp-vault-create-update-aws
      description: HashiCorp Vault Create or update AWS role
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: secrets-engines-aws.createorupdateawsrole
      with:
        name: tools.name
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: hashicorp-vault-delete-aws-role
      description: HashiCorp Vault Delete AWS role
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: secrets-engines-aws.deleteawsrole
      with:
        name: tools.name
      outputParameters:
      - type: object
        mapping: $.
