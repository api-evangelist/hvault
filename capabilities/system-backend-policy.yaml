naftiko: 1.0.0-alpha2
info:
  label: HashiCorp Vault Vault System Backend API — Policy
  description: 'HashiCorp Vault Vault System Backend API — Policy. 4 operations. Lead operation: HashiCorp Vault List ACL
    policies. Self-contained Naftiko capability covering one Hvault business surface.'
  tags:
  - Hvault
  - Policy
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    HVAULT_API_KEY: HVAULT_API_KEY
capability:
  consumes:
  - type: http
    namespace: system-backend-policy
    baseUri: https://vault.example.com/v1
    description: HashiCorp Vault Vault System Backend API — Policy business capability. Self-contained, no shared references.
    resources:
    - name: sys-policies-acl
      path: /sys/policies/acl
      operations:
      - name: listpolicies
        method: GET
        description: HashiCorp Vault List ACL policies
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: sys-policies-acl-name
      path: /sys/policies/acl/{name}
      operations:
      - name: readpolicy
        method: GET
        description: HashiCorp Vault Read ACL policy
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: createorupdatepolicy
        method: PUT
        description: HashiCorp Vault Create or update ACL policy
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
      - name: deletepolicy
        method: DELETE
        description: HashiCorp Vault Delete ACL policy
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: apikey
      key: X-Vault-Token
      value: '{{env.HVAULT_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: system-backend-policy-rest
    port: 8080
    description: REST adapter for HashiCorp Vault Vault System Backend API — Policy. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/sys/policies/acl
      name: sys-policies-acl
      description: REST surface for sys-policies-acl.
      operations:
      - method: GET
        name: listpolicies
        description: HashiCorp Vault List ACL policies
        call: system-backend-policy.listpolicies
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/sys/policies/acl/{name}
      name: sys-policies-acl-name
      description: REST surface for sys-policies-acl-name.
      operations:
      - method: GET
        name: readpolicy
        description: HashiCorp Vault Read ACL policy
        call: system-backend-policy.readpolicy
        outputParameters:
        - type: object
          mapping: $.
      - method: PUT
        name: createorupdatepolicy
        description: HashiCorp Vault Create or update ACL policy
        call: system-backend-policy.createorupdatepolicy
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
      - method: DELETE
        name: deletepolicy
        description: HashiCorp Vault Delete ACL policy
        call: system-backend-policy.deletepolicy
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: system-backend-policy-mcp
    port: 9090
    transport: http
    description: MCP adapter for HashiCorp Vault Vault System Backend API — Policy. One tool per consumed operation, routed
      inline through this capability's consumes block.
    tools:
    - name: hashicorp-vault-list-acl-policies
      description: HashiCorp Vault List ACL policies
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: system-backend-policy.listpolicies
      outputParameters:
      - type: object
        mapping: $.
    - name: hashicorp-vault-read-acl-policy
      description: HashiCorp Vault Read ACL policy
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: system-backend-policy.readpolicy
      outputParameters:
      - type: object
        mapping: $.
    - name: hashicorp-vault-create-update-acl
      description: HashiCorp Vault Create or update ACL policy
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: system-backend-policy.createorupdatepolicy
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: hashicorp-vault-delete-acl-policy
      description: HashiCorp Vault Delete ACL policy
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: system-backend-policy.deletepolicy
      outputParameters:
      - type: object
        mapping: $.
