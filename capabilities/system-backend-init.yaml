naftiko: 1.0.0-alpha2
info:
  label: HashiCorp Vault Vault System Backend API — Init
  description: 'HashiCorp Vault Vault System Backend API — Init. 2 operations. Lead operation: HashiCorp Vault Read initialization
    status. Self-contained Naftiko capability covering one Hvault business surface.'
  tags:
  - Hvault
  - Init
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    HVAULT_API_KEY: HVAULT_API_KEY
capability:
  consumes:
  - type: http
    namespace: system-backend-init
    baseUri: https://vault.example.com/v1
    description: HashiCorp Vault Vault System Backend API — Init business capability. Self-contained, no shared references.
    resources:
    - name: sys-init
      path: /sys/init
      operations:
      - name: getinitstatus
        method: GET
        description: HashiCorp Vault Read initialization status
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: initializevault
        method: PUT
        description: HashiCorp Vault Initialize Vault
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: apikey
      key: X-Vault-Token
      value: '{{env.HVAULT_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: system-backend-init-rest
    port: 8080
    description: REST adapter for HashiCorp Vault Vault System Backend API — Init. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/sys/init
      name: sys-init
      description: REST surface for sys-init.
      operations:
      - method: GET
        name: getinitstatus
        description: HashiCorp Vault Read initialization status
        call: system-backend-init.getinitstatus
        outputParameters:
        - type: object
          mapping: $.
      - method: PUT
        name: initializevault
        description: HashiCorp Vault Initialize Vault
        call: system-backend-init.initializevault
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: system-backend-init-mcp
    port: 9090
    transport: http
    description: MCP adapter for HashiCorp Vault Vault System Backend API — Init. One tool per consumed operation, routed
      inline through this capability's consumes block.
    tools:
    - name: hashicorp-vault-read-initialization-status
      description: HashiCorp Vault Read initialization status
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: system-backend-init.getinitstatus
      outputParameters:
      - type: object
        mapping: $.
    - name: hashicorp-vault-initialize-vault
      description: HashiCorp Vault Initialize Vault
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: system-backend-init.initializevault
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
