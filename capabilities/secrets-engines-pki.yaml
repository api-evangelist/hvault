naftiko: 1.0.0-alpha2
info:
  label: HashiCorp Vault Vault Secrets Engines API — PKI
  description: 'HashiCorp Vault Vault Secrets Engines API — PKI. 4 operations. Lead operation: HashiCorp Vault Read CA certificate.
    Self-contained Naftiko capability covering one Hvault business surface.'
  tags:
  - Hvault
  - PKI
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    HVAULT_API_KEY: HVAULT_API_KEY
capability:
  consumes:
  - type: http
    namespace: secrets-engines-pki
    baseUri: https://vault.example.com/v1
    description: HashiCorp Vault Vault Secrets Engines API — PKI business capability. Self-contained, no shared references.
    resources:
    - name: pki-ca
      path: /pki/ca
      operations:
      - name: readcacertificate
        method: GET
        description: HashiCorp Vault Read CA certificate
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: pki-issue-name
      path: /pki/issue/{name}
      operations:
      - name: issuecertificate
        method: POST
        description: HashiCorp Vault Issue certificate
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: name
          in: path
          type: string
          description: Name of the PKI role
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: pki-roles-name
      path: /pki/roles/{name}
      operations:
      - name: readpkirole
        method: GET
        description: HashiCorp Vault Read PKI role
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: name
          in: path
          type: string
          description: Name of the PKI role
          required: true
      - name: createorupdatepkirole
        method: POST
        description: HashiCorp Vault Create or update PKI role
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: name
          in: path
          type: string
          description: Name of the PKI role
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: apikey
      key: X-Vault-Token
      value: '{{env.HVAULT_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: secrets-engines-pki-rest
    port: 8080
    description: REST adapter for HashiCorp Vault Vault Secrets Engines API — PKI. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/pki/ca
      name: pki-ca
      description: REST surface for pki-ca.
      operations:
      - method: GET
        name: readcacertificate
        description: HashiCorp Vault Read CA certificate
        call: secrets-engines-pki.readcacertificate
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/pki/issue/{name}
      name: pki-issue-name
      description: REST surface for pki-issue-name.
      operations:
      - method: POST
        name: issuecertificate
        description: HashiCorp Vault Issue certificate
        call: secrets-engines-pki.issuecertificate
        with:
          name: rest.name
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/pki/roles/{name}
      name: pki-roles-name
      description: REST surface for pki-roles-name.
      operations:
      - method: GET
        name: readpkirole
        description: HashiCorp Vault Read PKI role
        call: secrets-engines-pki.readpkirole
        with:
          name: rest.name
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: createorupdatepkirole
        description: HashiCorp Vault Create or update PKI role
        call: secrets-engines-pki.createorupdatepkirole
        with:
          name: rest.name
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: secrets-engines-pki-mcp
    port: 9090
    transport: http
    description: MCP adapter for HashiCorp Vault Vault Secrets Engines API — PKI. One tool per consumed operation, routed
      inline through this capability's consumes block.
    tools:
    - name: hashicorp-vault-read-ca-certificate
      description: HashiCorp Vault Read CA certificate
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: secrets-engines-pki.readcacertificate
      outputParameters:
      - type: object
        mapping: $.
    - name: hashicorp-vault-issue-certificate
      description: HashiCorp Vault Issue certificate
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: secrets-engines-pki.issuecertificate
      with:
        name: tools.name
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: hashicorp-vault-read-pki-role
      description: HashiCorp Vault Read PKI role
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: secrets-engines-pki.readpkirole
      with:
        name: tools.name
      outputParameters:
      - type: object
        mapping: $.
    - name: hashicorp-vault-create-update-pki
      description: HashiCorp Vault Create or update PKI role
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: secrets-engines-pki.createorupdatepkirole
      with:
        name: tools.name
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
