        description: HashiCorp Vault Login with AppRole
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: auth-approle-role-role_name
      path: /auth/approle/role/{role_name}
      operations:
      - name: readapprole
        method: GET
        description: HashiCorp Vault Read AppRole
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: createorupdateapprole
        method: POST
        description: HashiCorp Vault Create or update AppRole
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
