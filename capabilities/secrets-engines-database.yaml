naftiko: 1.0.0-alpha2
info:
  label: HashiCorp Vault Vault Secrets Engines API — Database
  description: 'HashiCorp Vault Vault Secrets Engines API — Database. 4 operations. Lead operation: HashiCorp Vault Generate
    database credentials. Self-contained Naftiko capability covering one Hvault business surface.'
  tags:
  - Hvault
  - Database
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    HVAULT_API_KEY: HVAULT_API_KEY
capability:
  consumes:
  - type: http
    namespace: secrets-engines-database
    baseUri: https://vault.example.com/v1
    description: HashiCorp Vault Vault Secrets Engines API — Database business capability. Self-contained, no shared references.
    resources:
    - name: database-creds-name
      path: /database/creds/{name}
      operations:
      - name: generatedatabasecredentials
        method: GET
        description: HashiCorp Vault Generate database credentials
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: name
          in: path
          type: string
          description: Name of the database role
          required: true
    - name: database-roles-name
      path: /database/roles/{name}
      operations:
      - name: readdatabaserole
        method: GET
        description: HashiCorp Vault Read database role
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: name
          in: path
          type: string
          description: Name of the role
          required: true
      - name: createorupdatedatabaserole
        method: POST
        description: HashiCorp Vault Create or update database role
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: name
          in: path
          type: string
          description: Name of the role
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
      - name: deletedatabaserole
        method: DELETE
        description: HashiCorp Vault Delete database role
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: name
          in: path
          type: string
          description: Name of the role
          required: true
    authentication:
      type: apikey
      key: X-Vault-Token
      value: '{{env.HVAULT_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: secrets-engines-database-rest
    port: 8080
    description: REST adapter for HashiCorp Vault Vault Secrets Engines API — Database. One Spectral-compliant resource per
      consumed operation, prefixed with /v1.
    resources:
    - path: /v1/database/creds/{name}
      name: database-creds-name
      description: REST surface for database-creds-name.
      operations:
      - method: GET
        name: generatedatabasecredentials
        description: HashiCorp Vault Generate database credentials
        call: secrets-engines-database.generatedatabasecredentials
        with:
          name: rest.name
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/database/roles/{name}
      name: database-roles-name
      description: REST surface for database-roles-name.
      operations:
      - method: GET
        name: readdatabaserole
        description: HashiCorp Vault Read database role
        call: secrets-engines-database.readdatabaserole
        with:
          name: rest.name
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: createorupdatedatabaserole
        description: HashiCorp Vault Create or update database role
        call: secrets-engines-database.createorupdatedatabaserole
        with:
          name: rest.name
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
      - method: DELETE
        name: deletedatabaserole
        description: HashiCorp Vault Delete database role
        call: secrets-engines-database.deletedatabaserole
        with:
          name: rest.name
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: secrets-engines-database-mcp
    port: 9090
    transport: http
    description: MCP adapter for HashiCorp Vault Vault Secrets Engines API — Database. One tool per consumed operation, routed
      inline through this capability's consumes block.
    tools:
    - name: hashicorp-vault-generate-database-credentials
      description: HashiCorp Vault Generate database credentials
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: secrets-engines-database.generatedatabasecredentials
      with:
        name: tools.name
      outputParameters:
      - type: object
        mapping: $.
    - name: hashicorp-vault-read-database-role
      description: HashiCorp Vault Read database role
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: secrets-engines-database.readdatabaserole
      with:
        name: tools.name
      outputParameters:
      - type: object
        mapping: $.
    - name: hashicorp-vault-create-update-database
      description: HashiCorp Vault Create or update database role
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: secrets-engines-database.createorupdatedatabaserole
      with:
        name: tools.name
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: hashicorp-vault-delete-database-role
      description: HashiCorp Vault Delete database role
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: secrets-engines-database.deletedatabaserole
      with:
        name: tools.name
      outputParameters:
      - type: object
        mapping: $.
