naftiko: 1.0.0-alpha2
info:
  label: HashiCorp Vault Vault System Backend API — Leader
  description: 'HashiCorp Vault Vault System Backend API — Leader. 1 operations. Lead operation: HashiCorp Vault Read leader
    status. Self-contained Naftiko capability covering one Hvault business surface.'
  tags:
  - Hvault
  - Leader
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    HVAULT_API_KEY: HVAULT_API_KEY
capability:
  consumes:
  - type: http
    namespace: system-backend-leader
    baseUri: https://vault.example.com/v1
    description: HashiCorp Vault Vault System Backend API — Leader business capability. Self-contained, no shared references.
    resources:
    - name: sys-leader
      path: /sys/leader
      operations:
      - name: readleaderstatus
        method: GET
        description: HashiCorp Vault Read leader status
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: apikey
      key: X-Vault-Token
      value: '{{env.HVAULT_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: system-backend-leader-rest
    port: 8080
    description: REST adapter for HashiCorp Vault Vault System Backend API — Leader. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/sys/leader
      name: sys-leader
      description: REST surface for sys-leader.
      operations:
      - method: GET
        name: readleaderstatus
        description: HashiCorp Vault Read leader status
        call: system-backend-leader.readleaderstatus
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: system-backend-leader-mcp
    port: 9090
    transport: http
    description: MCP adapter for HashiCorp Vault Vault System Backend API — Leader. One tool per consumed operation, routed
      inline through this capability's consumes block.
    tools:
    - name: hashicorp-vault-read-leader-status
      description: HashiCorp Vault Read leader status
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: system-backend-leader.readleaderstatus
      outputParameters:
      - type: object
        mapping: $.
